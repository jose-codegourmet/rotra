name: Biome

on:
  pull_request:

jobs:
  biome:
    name: biome / ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [client, admin, umpire]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check (${{ matrix.app }})
        run: pnpm --filter @rotra/${{ matrix.app }} lint
